<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DbD Server Status — Make Your Choice</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --text: #c9d1d9; --muted: #8b949e; --accent: #6e5494;
            --green: #3fb950; --orange: #d2991d; --red: #f85149; --blue: #58a6ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        header h1 { font-size: 1.15rem; color: #fff; }
        header .badge { background: var(--accent); padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; }
        nav { display: flex; gap: 6px; }
        nav button { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; transition: all 0.15s; }
        nav button:hover { background: #1f2937; }
        nav button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        nav button.watch { font-size: 0.75rem; padding: 4px 10px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .stat-card h3 { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; }
        .stat-card .value.green { color: var(--green); }
        .stat-card .value.orange { color: var(--orange); }
        .stat-card .value.red { color: var(--red); }
        .stat-card .sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
        .stat-card .schedule { font-size: 0.75rem; color: var(--muted); white-space: pre-line; line-height: 1.5; margin-top: 6px; }
        .legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 8px 0; font-size: 0.75rem; color: var(--muted); }
        .legend .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 5px; }
        .dot.g { background: var(--green); } .dot.o { background: var(--orange); } .dot.r { background: var(--red); }
        .section-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 20px 0 6px; padding: 0 4px; }
        .server-row { display: grid; grid-template-columns: 1fr 80px 110px 60px; gap: 10px; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; margin-bottom: 4px; }
        .server-row.unstable { border-left: 3px solid var(--orange); }
        .server-row.stable { border-left: 3px solid var(--green); }
        .server-name { font-weight: 600; font-size: 0.9rem; }
        .server-name .tag { font-size: 0.65rem; background: var(--orange); color: #000; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
        .latency { text-align: center; font-family: 'SF Mono',monospace; font-size: 0.88rem; }
        .latency.good { color: var(--green); } .latency.ok { color: var(--orange); } .latency.bad { color: var(--red); } .latency.dead { color: var(--muted); }
        .fleet { text-align: center; font-weight: 600; font-size: 0.82rem; }
        .fleet.online { color: var(--green); } .fleet.offline { color: var(--red); } .fleet.active { color: var(--green); } .fleet.inactive { color: var(--orange); }
        .fleet.unknown { color: var(--muted); }
        .watch-toggle { text-align: center; cursor: pointer; font-size: 1rem; user-select: none; opacity: 0.5; }
        .watch-toggle.watching { opacity: 1; }
        .chart-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .chart-wrapper h3 { font-size: 0.9rem; margin-bottom: 8px; color: #ccc; }
        .chart-inner { position: relative; height: 200px; }
        .heatmap-grid { display: grid; grid-template-columns: 50px repeat(7, 1fr); gap: 2px; font-size: 0.7rem; }
        .heatmap-grid .hdr { color: var(--muted); text-align: center; padding: 4px; }
        .heatmap-grid .cell { text-align: center; padding: 6px 2px; border-radius: 3px; font-weight: 600; cursor: default; }
        .cell.high { background: #1a7f37; color: #fff; } .cell.med { background: #9a6700; color: #fff; }
        .cell.low { background: #5c1515; color: var(--muted); } .cell.none { background: var(--card); color: var(--muted); }
        .range-btns { display: flex; gap: 4px; margin-top: 8px; }
        .range-btns button { background: var(--card); color: var(--muted); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .range-btns button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .hidden { display: none !important; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { text-align: center; padding: 20px; font-size: 0.7rem; color: var(--muted); border-top: 1px solid var(--border); margin-top: 30px; }
        .footer a { color: var(--accent); text-decoration: none; }
        .notify-banner { background: var(--accent); color: #fff; text-align: center; padding: 8px; font-size: 0.78rem; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div class="notify-banner" id="notifyBanner" onclick="requestNotificationPermission()">
    Click here to enable browser notifications for server status changes
</div>

<header>
    <div>
        <h1>Dead by Daylight — Server Fleet Status</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
        <span id="lastUpdate" class="badge">checking…</span>
        <nav>
            <button id="navStatus" class="active" onclick="switchTab('status')">Live</button>
            <button id="navGraphs" onclick="switchTab('graphs')">Charts</button>
            <button id="navStats" onclick="switchTab('stats')">Insights</button>
        </nav>
    </div>
</header>

<div class="container">

    <!-- LIVE STATUS VIEW -->
    <div id="tabStatus">
        <div class="legend">
            <span><span class="dot g"></span> Online</span>
            <span><span class="dot o"></span> Ramped Down</span>
            <span><span class="dot r"></span> Offline</span>
            <span style="margin-left:auto;">🔔 = watching</span>
        </div>
        <div id="grid"></div>
    </div>

    <!-- GRAPHS VIEW -->
    <div id="tabGraphs" class="hidden">
        <div class="range-btns" style="margin-bottom:16px;">
            <button data-hours="1">1h</button>
            <button data-hours="6">6h</button>
            <button data-hours="24">24h</button>
            <button class="active" data-hours="168">7d</button>
            <button data-hours="720">30d</button>
            <button data-hours="2160">90d</button>
        </div>
        <div id="chartsContainer"></div>
    </div>

    <!-- INSIGHTS VIEW -->
    <div id="tabStats" class="hidden">
        <div id="statsCards" class="stats-row"></div>
        <div class="range-btns" style="margin-bottom:12px;">
            <button data-hours="24">24h</button>
            <button class="active" data-hours="168">7d</button>
            <button data-hours="336">14d</button>
        </div>
        <div id="heatmapsContainer"></div>
    </div>

</div>

<div class="footer">
    Powered by <a href="https://github.com/crweul/make-your-choice">Make Your Choice</a> &mdash; Every 30s &mdash; {{ host_location }}
</div>

<script>
const REGIONS = {{ regions | tojson }};
const UNSTABLE = Object.entries(REGIONS).filter(([,v]) => !v.stable).map(([k]) => k);
const GROUPS = ['Europe','Americas','Asia','Oceania','China'];

let currentTab = 'status';
let currentHours = 168;
let statsHours = 168;
let chartInstances = {};
let watching = JSON.parse(localStorage.getItem('dbd_watched') || '[]');
let lastFleet = {};
let notifyGranted = false;
let currentStatusData = {};

function saveWatch() { localStorage.setItem('dbd_watched', JSON.stringify(watching)); }

function notify(msg) {
    if (notifyGranted && document.hidden) {
        new Notification('DbD Server Status', { body: msg, icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔔</text></svg>' });
    }
}

function requestNotificationPermission() {
    if (!('Notification' in window)) return;
    Notification.requestPermission().then(p => {
        if (p === 'granted') { notifyGranted = true; document.getElementById('notifyBanner').style.display = 'none'; }
    });
}

function toggleWatch(name) {
    const idx = watching.indexOf(name);
    if (idx >= 0) watching.splice(idx, 1);
    else watching.push(name);
    saveWatch();
    renderStatus();
}

// ---- Tab switching ----
function switchTab(tab) {
    currentTab = tab;
    ['Status','Graphs','Stats'].forEach(t => document.getElementById('tab'+t).classList.toggle('hidden', t !== tab));
    ['navStatus','navGraphs','navStats'].forEach(id => document.getElementById(id).classList.toggle('active', id === 'nav'+tab));
    if (tab === 'graphs') renderGraphs();
    if (tab === 'stats') renderStats();
    if (tab === 'status') renderStatus();
}

// ---- Live Status ----
function renderStatus() {
    fetch('/api/status').then(r => r.json()).then(data => {
        currentStatusData = data;
        const grid = document.getElementById('grid');
        const groups = {};
        for (const [name, info] of Object.entries(REGIONS)) {
            if (!groups[info.group]) groups[info.group] = [];
            groups[info.group].push({ name, ...info, status: data[name] });
        }
        let now = null;
        for (const s of Object.values(data)) { if (s.last_check_iso) { now = s.last_check_iso; break; } }
        if (now) document.getElementById('lastUpdate').textContent = 'Last: ' + new Date(now).toLocaleTimeString();

        // Detect changes for notifications
        for (const name of UNSTABLE) {
            const prev = lastFleet[name];
            const curr = data[name] ? data[name].fleet_active : null;
            if (prev !== undefined && prev !== curr && watching.includes(name)) {
                const label = curr ? 'is now ACTIVE' : 'may be RAMPED DOWN';
                notify(name.replace(/^.*\(/, '(').replace(')','') + ' ' + label);
            }
            lastFleet[name] = curr;
        }

        let html = '';
        for (const g of GROUPS) {
            const servers = groups[g];
            if (!servers || !servers.length) continue;
            html += '<div class="section-title">' + g + '</div>';
            for (const s of servers) {
                const stable = s.stable;
                const icmp = s.status ? s.status.icmp_ms : null;
                const fleet = s.status ? s.status.fleet_active : null;

                let icmpClass = 'dead', icmpText = '\u2014';
                if (icmp !== null) {
                    icmpText = Math.round(icmp) + ' ms';
                    if (icmp < 80) icmpClass = 'good';
                    else if (icmp < 130) icmpClass = 'ok';
                    else if (icmp < 250) icmpClass = 'bad';
                }

                let fleetClass = 'unknown', fleetText = '?';
                if (stable) {
                    fleetClass = icmp !== null ? 'online' : 'offline';
                    fleetText = icmp !== null ? 'Online' : 'Offline';
                } else {
                    if (fleet === true) { fleetClass = 'active'; fleetText = '\u2713 Active'; }
                    else if (fleet === false) { fleetClass = 'inactive'; fleetText = '\u26A0 Down'; }
                }

                const rowClass = stable ? 'stable' : 'unstable';
                const tag = !stable ? '<span class="tag">unstable</span>' : '';
                const w = watching.includes(s.name);
                const wCls = w ? 'watching' : '';
                const wIcon = w ? '\u{1F514}' : '\u{1F515}';

                html += '<div class="server-row ' + rowClass + '">' +
                    '<div class="server-name">' + s.name + tag + '</div>' +
                    '<div class="latency ' + icmpClass + '">' + icmpText + '</div>' +
                    '<div class="fleet ' + fleetClass + '">' + fleetText + '</div>' +
                    '<div class="watch-toggle ' + wCls + '" title="Toggle notifications" onclick="toggleWatch(\'' + s.name.replace(/'/g, "\\'") + '\')">' + wIcon + '</div>' +
                '</div>';
            }
        }
        grid.innerHTML = html;
    }).catch(() => { grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">Failed to load.</div>'; });
}

// ---- Graphs ----
function renderGraphs() {
    destroyCharts();
    const charts = [
        { id: 'canvasEurope', name: 'Europe (London)', color: '#3fb950', title: 'Europe (London)' },
        { id: 'canvasOhio', name: 'US East (Ohio)', color: '#58a6ff', title: 'US East (Ohio)' },
        { id: 'canvasCanada', name: 'Canada (Central)', color: '#d2991d', title: 'Canada (Central)' },
    ];
    const container = document.getElementById('chartsContainer');
    container.innerHTML = charts.map(c =>
        '<div class="chart-wrapper"><h3>'+c.title+' \u26A0 Unstable</h3><div class="chart-inner"><canvas id="'+c.id+'"></canvas></div></div>'
    ).join('');

    fetch('/api/history?hours=' + currentHours).then(r => r.json()).then(data => {
        charts.forEach(c => {
            const points = data[c.name] || [];
            const ctx = document.getElementById(c.id).getContext('2d');
            chartInstances[c.id] = new Chart(ctx, {
                type: 'line',
                data: { datasets: [{
                    label: c.name,
                    data: points.map(p => ({ x: p.ts*1000, y: p.fleet===true ? 1 : p.fleet===false ? 0 : -0.1 })),
                    borderColor: c.color, backgroundColor: c.color+'33', borderWidth: 2, pointRadius: 0, stepped: 'before', fill: true, tension: 0,
                }]},
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    interaction: { mode: 'nearest', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => ctx.parsed.y >= 0.9 ? 'Active' : ctx.parsed.y >= 0 ? 'Ramped Down' : 'Unknown' } },
                        zoom: { pan: { enabled: true, mode: 'x' }, zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' } },
                    },
                    scales: {
                        x: { type: 'time', time: { unit: 'hour', displayFormats: { hour: 'MMM d HH:mm' } }, grid: { color: '#21262d' }, ticks: { color: '#8b949e', font: { size: 9 } } },
                        y: { min: -0.2, max: 1.2, ticks: { color: '#8b949e', font:{size:9}, stepSize:1, callback: v => v===1?'Active':v===0?'Down':'' }, grid: { color: '#21262d' } },
                    },
                },
            });
        });
    });
}

function destroyCharts() { Object.values(chartInstances).forEach(c => c && c.destroy()); chartInstances = {}; }

// ---- Stats / Insights ----
function renderStats() {
    fetch('/api/stats?hours=' + statsHours).then(r => r.json()).then(data => {
        buildStatCards(data);
        buildHeatmaps(data);
    });
}

function buildStatCards(data) {
    const container = document.getElementById('statsCards');
    const colors = { 'Europe (London)': '#3fb950', 'US East (Ohio)': '#58a6ff', 'Canada (Central)': '#d2991d' };
    let html = '';
    for (const name of UNSTABLE) {
        const s = data[name] || {};
        const clr = s.uptime_pct >= 70 ? 'green' : s.uptime_pct >= 30 ? 'orange' : 'red';
        html += '<div class="stat-card">' +
            '<h3>' + name + '</h3>' +
            '<div class="value ' + clr + '">' + s.uptime_pct + '%</div>' +
            '<div class="sub">uptime over last ' + (statsHours >= 168 ? Math.round(statsHours/24)+'d' : statsHours+'h') + '</div>' +
            '<div class="sub">Last active: ' + (s.last_active || 'N/A') + '</div>' +
            (s.schedule && s.schedule !== 'Insufficient data' ? '<div class="schedule">' + s.schedule + '</div>' : '') +
        '</div>';
    }
    container.innerHTML = html;
}

function buildHeatmaps(data) {
    const container = document.getElementById('heatmapsContainer');
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let html = '';
    for (const name of UNSTABLE) {
        const hm = (data[name] || {}).heatmap || {};
        if (Object.keys(hm).length === 0) continue;
        html += '<div class="chart-wrapper"><h3>' + name + ' — Fleet Active Heatmap</h3>';
        html += '<div class="heatmap-grid">';
        html += '<div class="hdr"></div>' + days.map(d => '<div class="hdr">'+d+'</div>').join('');
        for (let hour = 0; hour < 24; hour++) {
            html += '<div class="hdr">'+String(hour).padStart(2,'0')+':00</div>';
            for (let dow = 0; dow < 7; dow++) {
                const key = hour + '_' + dow;
                const cell = hm[key];
                const pct = cell ? cell.pct : -1;
                let cls = 'none';
                if (pct >= 70) cls = 'high';
                else if (pct >= 30) cls = 'med';
                else if (pct >= 0) cls = 'low';
                html += '<div class="cell ' + cls + '" title="'+(cell?cell.pct+'% active ('+cell.samples+' checks)':'no data')+'">' + (pct >= 0 ? pct : '') + '</div>';
            }
        }
        html += '</div></div>';
    }
    container.innerHTML = html || '<div style="color:var(--muted);text-align:center;padding:40px;">Not enough data yet. Check back after a few hours.</div>';
}

// ---- Setup ----
if ('Notification' in window && Notification.permission === 'granted') {
    notifyGranted = true;
} else if ('Notification' in window && Notification.permission === 'default') {
    document.getElementById('notifyBanner').style.display = 'block';
}

document.querySelectorAll('.range-btns').forEach(bar => {
    bar.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
            bar.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const h = parseInt(btn.dataset.hours);
            if (bar.closest('#tabGraphs')) { currentHours = h; renderGraphs(); }
            if (bar.closest('#tabStats')) { statsHours = h; renderStats(); }
        });
    });
});

renderStatus();
setInterval(() => {
    if (currentTab === 'status') renderStatus();
}, 15000);
setInterval(() => {
    if (currentTab === 'graphs') renderGraphs();
    if (currentTab === 'stats') renderStats();
}, 60000);
</script>
</body>
</html>
